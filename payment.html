<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirmação de Pagamentos — Carregando...</title>
  <style>
    :root { --bg:#0f172a; --surface:#fff; --text:#0f172a; --muted:#64748b; --primary:#2563eb; --success:#166534; --warn:#92400e; --danger:#b91c1c; --border:#e2e8f0; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top right,#1e3a8a 0%,#0f172a 42%,#020617 100%);color:var(--text);padding:16px}
    .wrap{max-width:980px;margin:0 auto;display:grid;gap:12px}
    .hero{color:#f8fafc;text-align:center}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
    .summary-item{border:1px solid var(--border);border-radius:10px;padding:10px;background:#f8fafc}
    .summary-label{display:block;font-size:.82rem;color:#334155;font-weight:600}
    .summary-value{display:block;font-size:1.5rem;font-weight:800;margin-top:4px}
    .muted{color:var(--muted)}
    .err{color:var(--danger);font-weight:700}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #edf2f7;text-align:left}
    th{font-size:.85rem;text-transform:uppercase;color:#334155}
    .badge{display:inline-flex;padding:4px 10px;border-radius:999px;font-size:.82rem;font-weight:700}
    .pending{background:#fef3c7;color:var(--warn)}
    .ok{background:#dcfce7;color:var(--success)}
    button{border:0;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer;background:#2563eb;color:#fff}
    button[disabled]{opacity:.5;cursor:not-allowed}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1 id="title">Confirmação de Pagamentos</h1>
      <p id="subtitle" class="muted" style="color:#cbd5e1">Carregando evento...</p>
    </section>

    <section class="card">
      <h2 style="margin:0 0 10px">Resumo de status</h2>
      <div id="summaryWrap" class="summary-grid">
        <div class="summary-item"><span class="summary-label">Total</span><span class="summary-value">-</span></div>
        <div class="summary-item"><span class="summary-label">Pagamento confirmado</span><span class="summary-value">-</span></div>
        <div class="summary-item"><span class="summary-label">Pendente de pagamento</span><span class="summary-value">-</span></div>
        <div class="summary-item"><span class="summary-label">Lista de Espera</span><span class="summary-value">-</span></div>
      </div>
    </section>

    <section class="card">
      <p id="msg" class="muted">Carregando dados...</p>
      <div id="tableWrap"></div>
    </section>
  </main>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.95.3/+esm";

const SUPABASE_URL = "https://nuqcefxwarrjehvhdoug.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51cWNlZnh3YXJyamVodmhkb3VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3NzE1NzUsImV4cCI6MjA4NjM0NzU3NX0.xLugRmdl6UKVsMZnDepBlFndh4vGVMnptuloFZC28Mc";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false} });

const titleEl = document.getElementById("title");
const subtitleEl = document.getElementById("subtitle");
const msgEl = document.getElementById("msg");
const tableWrap = document.getElementById("tableWrap");
const summaryWrap = document.getElementById("summaryWrap");

const params = new URLSearchParams(location.search);
const eventSlug = params.get("event");

function formatDateTime(value){
  if(!value) return "Data não informada";
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return "Data inválida";
  return d.toLocaleString("pt-BR", { dateStyle:"full", timeStyle:"short" });
}

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>\"']/g, (char)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[char]));
}

async function confirmPayment(registrationId){
  const { error } = await supabase
    .from("registrations")
    .update({ payment_confirmed: true })
    .eq("id", registrationId)
    .eq("event_id", window.EVENT_ID);

  if(error){
    msgEl.textContent = "Erro ao confirmar pagamento. Tente novamente.";
    msgEl.className = "err";
    return;
  }

  msgEl.textContent = "Pagamento confirmado com sucesso.";
  msgEl.className = "muted";
  await loadRegistrations();
}

window.confirmPayment = confirmPayment;

function getRegistrationStatus(registration, index, limit){
  const withinLimit = limit > 0 ? index < limit : true;
  if(!withinLimit){
    return { label: "Lista de Espera", className: "pending" };
  }

  if(registration.payment_confirmed === true){
    return { label: "Pagamento confirmado", className: "ok" };
  }

  return { label: "Pendente de pagamento", className: "pending" };
}

async function loadRegistrations(){
  const { data, error } = await supabase
    .from("registrations")
    .select("id,couple_name,payment_confirmed,queue_pos,created_at")
    .eq("event_id", window.EVENT_ID)
    .order("queue_pos", { ascending: true, nullsFirst: false })
    .order("created_at", { ascending: true });

  if(error){
    tableWrap.innerHTML = "<p class='err'>Erro ao carregar casais.</p>";
    return;
  }

  const limit = Number(window.MAX_COUPLES || 0);

  const registrations = data || [];
  const counters = {
    total: registrations.length,
    confirmed: 0,
    pending: 0,
    waiting: 0,
  };

  const rows = registrations.map((r, idx)=>{
    const status = getRegistrationStatus(r, idx, limit);
    const confirmed = status.label === "Pagamento confirmado";
    const waitingList = status.label === "Lista de Espera";
    if(status.label === "Pagamento confirmado") counters.confirmed += 1;
    else if(status.label === "Pendente de pagamento") counters.pending += 1;
    else if(status.label === "Lista de Espera") counters.waiting += 1;

    const badge = `<span class="badge ${status.className}">${status.label}</span>`;
    const action = confirmed
      ? `<button type="button" onclick="window.open('recibo.html?rid=${encodeURIComponent(r.id)}','_blank','noopener')">Recibo</button>`
      : (waitingList ? "<span class='muted'>-</span>" : `<button onclick=\"confirmPayment('${r.id}')\">Confirmar</button>`);

    return `<tr><td>${escapeHtml(r.couple_name || "Sem nome")}</td><td>${badge}</td><td>${action}</td></tr>`;
  }).join("");

  summaryWrap.innerHTML = `
    <div class="summary-item"><span class="summary-label">Total</span><span class="summary-value">${counters.total}</span></div>
    <div class="summary-item"><span class="summary-label">Pagamento confirmado</span><span class="summary-value">${counters.confirmed}</span></div>
    <div class="summary-item"><span class="summary-label">Pendente de pagamento</span><span class="summary-value">${counters.pending}</span></div>
    <div class="summary-item"><span class="summary-label">Lista de Espera</span><span class="summary-value">${counters.waiting}</span></div>
  `;

  tableWrap.innerHTML = `
    <table>
      <thead><tr><th>Casal</th><th>Status</th><th>Ação rápida</th></tr></thead>
      <tbody>${rows || "<tr><td colspan='3' class='muted'>Nenhuma inscrição encontrada.</td></tr>"}</tbody>
    </table>
  `;
}

(async function init(){
  if(!eventSlug){
    msgEl.textContent = "Link inválido: informe ?event=slug-do-evento";
    msgEl.className = "err";
    return;
  }

  const { data: eventData, error: eventError } = await supabase
    .from("events")
    .select("id,title,event_at,local,requires_dish,max_couples")
    .eq("slug", eventSlug)
    .maybeSingle();

  if(eventError || !eventData){
    msgEl.textContent = "Evento não encontrado para o slug informado.";
    msgEl.className = "err";
    return;
  }

  if(eventData.requires_dish !== false){
    titleEl.textContent = "Confirmação de Pagamentos indisponível";
    subtitleEl.textContent = eventData.title || "Evento";
    msgEl.textContent = "Esta página só está disponível para eventos sem exigência de prato.";
    msgEl.className = "err";
    return;
  }

  window.EVENT_ID = eventData.id;
  window.MAX_COUPLES = Number(eventData.max_couples || 0);
  titleEl.textContent = `Confirmação de Pagamentos — ${eventData.title || "Evento"}`;
  subtitleEl.textContent = `${eventData.local || "Local não informado"} • ${formatDateTime(eventData.event_at)}`;
  document.title = `Pagamentos — ${eventData.title || "Evento"}`;
  msgEl.textContent = "Toque em confirmar para marcar pendências ou em recibo para abrir comprovantes já confirmados.";

  await loadRegistrations();
})();
</script>
</body>
</html>
