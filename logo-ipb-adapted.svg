<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" role="img" aria-labelledby="title desc">
  <title id="title">IPBsb - Igreja Presbiteriana de Brasília</title>
  <desc id="desc">Logo IPBsb adaptada para a paleta azul, turquesa e violeta do projeto.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="28" y1="24" x2="330" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="deepGradient" x1="52" y1="38" x2="174" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#020617" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#22d3ee" flood-opacity="0.20"/>
    </filter>
  </defs>
  <rect width="420" height="180" rx="34" fill="#0b1220" opacity="0"/>
  <g filter="url(#softGlow)">
    <circle cx="90" cy="90" r="72" fill="none" stroke="url(#brandGradient)" stroke-width="18"/>
    <path d="M44 119c18-27 51-35 82-18 17 9 39 14 62-13" fill="none" stroke="url(#brandGradient)" stroke-width="18" stroke-linecap="round"/>
    <path d="M88 34v91" stroke="#eaf0ff" stroke-width="12" stroke-linecap="round"/>
    <path d="M63 67c24-9 51-8 76 4v48c-18-8-39-7-56 4V77c-7 2-14 4-20 7z" fill="url(#deepGradient)"/>
    <circle cx="90" cy="102" r="7" fill="#eaf0ff"/>
    <path d="M136 40v44" stroke="#eaf0ff" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g fill="url(#brandGradient)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="190" y="89" font-size="72" font-weight="900" letter-spacing="-4">IPBsb</text>
    <text x="193" y="123" font-size="22" font-weight="800" letter-spacing="1.5">IGREJA PRESBITERIANA</text>
    <text x="193" y="151" font-size="24" font-weight="900" letter-spacing="1">DE BRASÍLIA</text>
  </g>
</svg>
